name: 打包并发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OSS_BUCKET: etf-radar-release1
  OSS_REGION: oss-cn-hangzhou

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 获取版本号
        id: version
        shell: bash
        run: echo "ver=$(grep 'VERSION' backend/app/core/config.py | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')" >> $GITHUB_OUTPUT

      - name: 构建前端
        run: |
          cd frontend
          npm ci
          npm run build

      - name: 复制前端到后端
        shell: bash
        run: cp -r frontend/dist backend/static

      - name: 安装后端依赖
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包 exe
        run: |
          cd backend
          python build_exe.py

      - name: 生成更新包
        run: |
          cd backend
          python build_update_pack.py

      - name: 复制使用说明
        shell: bash
        run: cp 使用说明.txt backend/dist/ETFRadar/

      - name: 打包zip
        shell: bash
        run: cd backend/dist && 7z a ETFRadar-Windows-v${{ steps.version.outputs.ver }}.zip ETFRadar/

      - name: 上传到 OSS
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VER=${{ steps.version.outputs.ver }}
          # 安装 ossutil
          curl -o ossutil.zip "https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil-v1.7.19-windows-amd64.zip"
          7z x ossutil.zip -oossutil
          OSSUTIL=$(find ossutil -name "ossutil64.exe" -o -name "ossutil.exe" | head -1)

          # 配置
          $OSSUTIL config -e ${{ env.OSS_REGION }}.aliyuncs.com \
            -i ${{ secrets.ALIYUN_ACCESS_KEY_ID }} \
            -k ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

          # 上传更新包
          $OSSUTIL cp backend/dist/etf-radar-update.zip \
            oss://${{ env.OSS_BUCKET }}/v${VER}/etf-radar-update.zip -f

          # 上传完整包
          $OSSUTIL cp backend/dist/ETFRadar-Windows-v${VER}.zip \
            oss://${{ env.OSS_BUCKET }}/v${VER}/ETFRadar-Windows-v${VER}.zip -f

          # 判断更新类型：Release描述含[cold]则为冷更新
          UPDATE_TYPE="hot"

          # 生成 version.json
          OSS_BASE="https://${{ env.OSS_BUCKET }}.${{ env.OSS_REGION }}.aliyuncs.com"
          GITHUB_BASE="https://github.com/${{ github.repository }}/releases/download/v${VER}"
          cat > version.json << EOF
          {
            "version": "${VER}",
            "update_type": "${UPDATE_TYPE}",
            "description": "",
            "github_url": "${GITHUB_BASE}/etf-radar-update.zip",
            "update_url": "${OSS_BASE}/v${VER}/etf-radar-update.zip",
            "full_url_windows": "${OSS_BASE}/v${VER}/ETFRadar-Windows-v${VER}.zip",
            "full_url_mac": "${OSS_BASE}/v${VER}/ETFRadar-Mac-v${VER}.zip"
          }
          EOF

          $OSSUTIL cp version.json oss://${{ env.OSS_BUCKET }}/version.json -f

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ETFRadar-Windows-v${{ steps.version.outputs.ver }}
          path: backend/dist/ETFRadar/

      - name: 发布 Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.ver }}
          body: |
            ## ETF雷达 v${{ steps.version.outputs.ver }}

            已安装用户打开程序后会自动提示更新。
          files: |
            backend/dist/ETFRadar-Windows-v${{ steps.version.outputs.ver }}.zip
            backend/dist/etf-radar-update.zip

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 获取版本号
        id: version
        run: echo "ver=$(grep 'VERSION' backend/app/core/config.py | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')" >> $GITHUB_OUTPUT

      - name: 构建前端
        run: |
          cd frontend
          npm ci
          npm run build
          cp -r dist ../backend/static

      - name: 安装后端依赖
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包
        run: |
          cd backend
          python build_exe.py

      - name: 复制使用说明
        run: cp 使用说明.txt backend/dist/ETFRadar/

      - name: 打包zip
        run: cd backend/dist && zip -r ETFRadar-Mac-v${{ steps.version.outputs.ver }}.zip ETFRadar/

      - name: 上传到 OSS
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VER=${{ steps.version.outputs.ver }}
          # 安装 ossutil
          curl -o ossutil.zip "https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil-v1.7.19-mac-amd64.zip"
          unzip ossutil.zip -d ossutil
          chmod +x ossutil/ossutil-v1.7.19-mac-amd64/ossutilmac64
          OSSUTIL=ossutil/ossutil-v1.7.19-mac-amd64/ossutilmac64

          $OSSUTIL config -e ${{ env.OSS_REGION }}.aliyuncs.com \
            -i ${{ secrets.ALIYUN_ACCESS_KEY_ID }} \
            -k ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

          $OSSUTIL cp backend/dist/ETFRadar-Mac-v${VER}.zip \
            oss://${{ env.OSS_BUCKET }}/v${VER}/ETFRadar-Mac-v${VER}.zip -f

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ETFRadar-Mac-v${{ steps.version.outputs.ver }}
          path: backend/dist/ETFRadar/

      - name: 发布 Release (Mac)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          append_body: true
          files: backend/dist/ETFRadar-Mac-v${{ steps.version.outputs.ver }}.zip
