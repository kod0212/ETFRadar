name: 打包 exe

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 构建前端
        run: |
          cd frontend
          npm ci
          npm run build

      - name: 复制前端到后端
        shell: bash
        run: cp -r frontend/dist backend/static

      - name: 安装后端依赖
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包 exe
        run: |
          cd backend
          python build_exe.py

      - name: 复制使用说明
        shell: bash
        run: cp 使用说明.txt backend/dist/ETFRadar/

      - name: 获取版本号
        id: version
        shell: bash
        run: echo "ver=$(grep 'VERSION' backend/app/core/config.py | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')" >> $GITHUB_OUTPUT

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ETFRadar-Windows-v${{ steps.version.outputs.ver }}
          path: backend/dist/ETFRadar/

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 构建前端
        run: |
          cd frontend
          npm ci
          npm run build
          cp -r dist ../backend/static

      - name: 安装后端依赖
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包
        run: |
          cd backend
          python build_exe.py

      - name: 复制使用说明
        run: cp 使用说明.txt backend/dist/ETFRadar/

      - name: 获取版本号
        id: version
        run: echo "ver=$(grep 'VERSION' backend/app/core/config.py | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')" >> $GITHUB_OUTPUT

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ETFRadar-Mac-v${{ steps.version.outputs.ver }}
          path: backend/dist/ETFRadar/
