name: 打包 exe

# 手动触发（GitHub页面点按钮）
on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 构建前端
        run: |
          cd frontend
          npm ci
          npm run build
          xcopy dist ..\backend\static /E /I /Y

      - name: 安装后端依赖
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包 exe
        run: |
          cd backend
          python build_exe.py

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ETFRadar-Windows
          path: backend/dist/ETFRadar/

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 构建前端
        run: |
          cd frontend
          npm ci
          npm run build
          cp -r dist ../backend/static

      - name: 安装后端依赖
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包
        run: |
          cd backend
          python build_exe.py

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ETFRadar-Mac
          path: backend/dist/ETFRadar/
