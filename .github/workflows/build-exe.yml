name: 打包并发布

on:
  push:
    tags:
      - 'v*'  # 推送tag时自动触发
  workflow_dispatch:  # 也支持手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write  # 需要写权限来创建Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 获取版本号
        id: version
        shell: bash
        run: echo "ver=$(grep 'VERSION' backend/app/core/config.py | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')" >> $GITHUB_OUTPUT

      - name: 构建前端
        run: |
          cd frontend
          npm ci
          npm run build

      - name: 复制前端到后端
        shell: bash
        run: cp -r frontend/dist backend/static

      - name: 安装后端依赖
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包 exe
        run: |
          cd backend
          python build_exe.py

      - name: 生成更新包
        run: |
          cd backend
          python build_update_pack.py

      - name: 复制使用说明
        shell: bash
        run: cp 使用说明.txt backend/dist/ETFRadar/

      - name: 打包zip
        shell: bash
        run: |
          cd backend/dist
          7z a ETFRadar-Windows-v${{ steps.version.outputs.ver }}.zip ETFRadar/

      - name: 上传完整包(Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ETFRadar-Windows-v${{ steps.version.outputs.ver }}
          path: backend/dist/ETFRadar/

      - name: 发布 Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.ver }}
          body: |
            ## ETF雷达 v${{ steps.version.outputs.ver }}

            ### 下载
            - **首次安装**: 下载 `ETFRadar-Windows-v${{ steps.version.outputs.ver }}.zip` 解压运行
            - **已有用户**: 程序启动时自动检测更新，无需手动操作

            ### 更新方式
            已安装用户启动程序后会自动提示更新。
          files: |
            backend/dist/ETFRadar-Windows-v${{ steps.version.outputs.ver }}.zip
            backend/dist/etf-radar-update.zip

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 获取版本号
        id: version
        run: echo "ver=$(grep 'VERSION' backend/app/core/config.py | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')" >> $GITHUB_OUTPUT

      - name: 构建前端
        run: |
          cd frontend
          npm ci
          npm run build
          cp -r dist ../backend/static

      - name: 安装后端依赖
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包
        run: |
          cd backend
          python build_exe.py

      - name: 复制使用说明
        run: cp 使用说明.txt backend/dist/ETFRadar/

      - name: 打包zip
        run: |
          cd backend/dist
          zip -r ETFRadar-Mac-v${{ steps.version.outputs.ver }}.zip ETFRadar/

      - name: 上传完整包(Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ETFRadar-Mac-v${{ steps.version.outputs.ver }}
          path: backend/dist/ETFRadar/

      - name: 发布 Release (Mac)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          append_body: true
          files: backend/dist/ETFRadar-Mac-v${{ steps.version.outputs.ver }}.zip
